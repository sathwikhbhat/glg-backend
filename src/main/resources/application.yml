# =======================================================================
# DO NOT enable `reWriteBatchedInserts=true` on the Postgres JDBC URL.
# Click ingestion relies on per-row return codes from JdbcTemplate.batchUpdate
# to detect new visitors (INSERT ... ON CONFLICT DO NOTHING → 1 means new,
# 0 means conflict). reWriteBatchedInserts collapses the batch into one
# multi-VALUES INSERT and returns a single aggregate count — new-visitor
# accounting then silently produces wrong numbers.
# See ClickAggregationRepository and ClickAggregationWriter.
# =======================================================================
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  web:
    error:
      whitelabel:
        enabled: false
      include-message: never
      include-stacktrace: never
      include-binding-errors: never
      include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: glg-backend

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
      internal-proxies: ${TRUSTED_PROXIES:10\.\d+\.\d+\.\d+|192\.168\.\d+\.\d+|169\.254\.\d+\.\d+|127\.\d+\.\d+\.\d+|172\.(1[6-9]|2\d|3[01])\.\d+\.\d+|0:0:0:0:0:0:0:1}
