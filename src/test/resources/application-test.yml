app:
  base-url: http://localhost:8080
  allowed-origins: http://localhost:5173
  rate-limit:
    create:
      capacity: 1000
      refill-per-minute: 1000

spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://issuer.test/
          jwk-set-uri: https://issuer.test/jwks.json

supabase:
  project-url: http://localhost:9999
  service-role-key: stub

maxmind:
  db-path: classpath:GeoLite2-City.mmdb
  license-key: ""